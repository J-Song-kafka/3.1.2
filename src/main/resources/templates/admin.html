<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
<h1>Панель администратора</h1>

<a th:href="@{/admin/new}">Создать нового пользователя</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Username</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${allUsers}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Имя</td>
        <td th:text="${user.username}">username</td>
        <td>
                    <span th:each="role : ${user.roles}"
                          th:text="${role.name} + ' '">ROLE_USER</span>
        </td>
        <td>
            <a th:href="@{/admin/edit(id=${user.id})}">Редактировать</a>
            <form th:action="@{/admin/delete}" method="post" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}">
                <button type="submit">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/}">На главную</a>
</body>
</html>
